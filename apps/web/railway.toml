# Railway config for @marketing-funnel/web (monorepo root build).
# In Railway service settings, set "Config file path" to: /apps/web/railway.toml
#
# Bukku leads persist in Supabase via marketing-funnel/api — set NEXT_PUBLIC_API_URL on this service.

[build]
builder = "RAILPACK"
buildCommand = "npm run build:web-deploy"
watchPatterns = [
  "apps/web/**",
  "package.json",
  "package-lock.json",
]

[deploy]
startCommand = "npm run start:web"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
