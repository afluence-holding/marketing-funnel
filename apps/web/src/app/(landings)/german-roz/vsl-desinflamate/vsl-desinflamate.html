        var fsHint = document.createElement('div');
        fsHint.setAttribute('role', 'status');
        fsHint.style.cssText = 'position:absolute;left:50%;bottom:56px;transform:translateX(-50%);z-index:36;max-width:min(92%,440px);padding:.7rem .95rem;border-radius:10px;font-size:12px;font-weight:600;letter-spacing:.01em;text-align:center;color:#fff;background:rgba(12,12,12,.75);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s ease;';
        fsHint.textContent = 'En iPhone puede no abrir fullscreen. Gira el telefono para una vista mas inmersiva.';
        wrap.appendChild(fsHint);

        function setFsButtonLabel() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
          fsBtn.innerHTML = isFs ? '\u2715 Salir pantalla completa' : '\u26F6 Pantalla completa';
        }
        var fsBtnTimer = null;
        function setFsButtonVisible(visible) {
          fsBtn.style.opacity = visible ? '1' : '0';
          fsBtn.style.pointerEvents = visible ? 'auto' : 'none';
        }
        function showFsButtonTemporarily() {
          setFsButtonVisible(true);
          clearTimeout(fsBtnTimer);
          fsBtnTimer = setTimeout(function () {
            setFsButtonVisible(false);
          }, 1800);
        }

        function requestWrapFullscreen() {
          var el = wrap;
          if (el.requestFullscreen) return el.requestFullscreen();
          if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
          return Promise.resolve();
        }

        function exitFullscreen() {
          if (document.exitFullscreen) return document.exitFullscreen();
          if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
          return Promise.resolve();
        }

        function isMobileLike() {
          return /iphone|ipad|ipod|android|mobile/i.test(navigator.userAgent || '');
        }

        var fsHintTimer = null;
        function showFullscreenFallbackHint() {
          fsHint.style.opacity = '1';
          clearTimeout(fsHintTimer);
          fsHintTimer = setTimeout(function () {
            fsHint.style.opacity = '0';
          }, 2800);
        }

        fsBtn.addEventListener('click', function (ev) {
          ev.stopPropagation();
          showFsButtonTemporarily();
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
          if (isFs) {
            exitFullscreen().catch(function () {});
            return;
          }
          requestWrapFullscreen()
            .then(function () {
              setTimeout(function () {
                var entered = !!(document.fullscreenElement || document.webkitFullscreenElement);
                if (!entered && isMobileLike()) showFullscreenFallbackHint();
              }, 250);
            })
            .catch(function () {
              if (isMobileLike()) showFullscreenFallbackHint();
            });
        });
        wrap.addEventListener('mousemove', showFsButtonTemporarily);
        wrap.addEventListener('touchstart', showFsButtonTemporarily, { passive: true });
        wrap.addEventListener('click', showFsButtonTemporarily);
        fsBtn.addEventListener('mouseenter', showFsButtonTemporarily);
        fsBtn.addEventListener('focus', showFsButtonTemporarily);
        document.addEventListener('fullscreenchange', function () {
          setFsButtonLabel();
          showFsButtonTemporarily();
        });
        document.addEventListener('webkitfullscreenchange', function () {
          setFsButtonLabel();
          showFsButtonTemporarily();
        });

        // overlay
        var ov = document.createElement('div');
        ov.style.cssText = 'position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;cursor:pointer;background:radial-gradient(ellipse at center,rgba(0,0,0,.3),rgba(0,0,0,.5));border-radius:inherit;transition:opacity .3s;';
        var btn = document.createElement('button');
        btn.innerHTML = '\uD83D\uDD0A Activar audio';
        btn.style.cssText = 'cursor:pointer;border:2px solid rgba(255,255,255,.85);border-radius:999px;padding:1rem 1.75rem;font-size:clamp(.95rem,2.8vw,1.1rem);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#0a0a0a;background:linear-gradient(180deg,#fff,#f0ebe3);box-shadow:0 8px 32px rgba(0,0,0,.35);font-family:system-ui,-apple-system,sans-serif;';
        ov.appendChild(btn);
        wrap.appendChild(ov);

        ov.addEventListener('click', function () {
          ov.style.opacity = '0';
          setTimeout(function () { ov.remove(); }, 300);
          showFsButtonTemporarily();
          // Reload iframe unmuted — user gesture allows autoplay with sound
          iframe.src = 'https://www.youtube.com/embed/' + YT_ID + '?autoplay=1&mute=0&playsinline=1&rel=0&modestbranding=1&controls=0&fs=0&disablekb=1&iv_load_policy=3&enablejsapi=1';

          // Set playback rate via postMessage once player is ready
          iframe.addEventListener('load', function () {
            // YouTube accepts postMessage commands when enablejsapi=1
            function sendRate() {
              try {
                iframe.contentWindow.postMessage(JSON.stringify({
                  event: 'command',
                  func: 'setPlaybackRate',
                  args: [SPEED]
                }), '*');
              } catch (e) { }
            }
            setTimeout(sendRate, 1000);
            setTimeout(sendRate, 2500);
          });
        });
      }

      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', function () { setTimeout(boot, 400); }); }
      else { setTimeout(boot, 400); }
    })();
  </script>
  <script>
    // VSL milestone tracker — sends progress to parent via postMessage
    (function () {
      var milestones = {25: false, 50: false, 75: false, 100: false};

      function startTracking() {
        var ytIframe = document.getElementById('yt-vsl');
        if (!ytIframe) return setTimeout(startTracking, 500);

        // Listen for YouTube postMessage events (enablejsapi=1 required)
        window.addEventListener('message', function (e) {
          var data;
          try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch (_) { return; }
          if (!data || data.event !== 'infoDelivery' || !data.info) return;
          var ct = data.info.currentTime;
          var dur = data.info.duration;
          if (!dur || ct == null) return;
          var pct = (ct / dur) * 100;
          [25, 50, 75, 100].forEach(function (m) {
            if (pct >= m && !milestones[m]) {
              milestones[m] = true;
              window.parent.postMessage({type: 'vsl-milestone', milestone: m}, '*');
            }
          });
        });

        // Tell YouTube we're listening so it starts sending infoDelivery
        function subscribe() {
          try {
            ytIframe.contentWindow.postMessage(JSON.stringify({event: 'listening'}), '*');
          } catch (_) {}
        }
        ytIframe.addEventListener('load', subscribe);
        subscribe();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () { setTimeout(startTracking, 600); });
      } else {
        setTimeout(startTracking, 600);
      }
    })();
  </script>
